services:
  app:
    build: .
    expose:
      - "8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - MQTT_BROKER=${MQTT_BROKER:-localhost}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_TOPIC=${MQTT_TOPIC:-aqi/sensor}
    volumes:
      - aqi_data:/app/db.sqlite3

volumes:
  aqi_data:
